name: CI Quality Assurance Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-validation-checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository Base
      uses: actions/checkout@v4

    - name: Initialize Isolated Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Load Official Poetry Package Engine
      uses: snok/install-poetry@v1
      with:
        version: 2.0.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Cache Shared Active Dependencies
      uses: actions/cache@v4
      id: cached-poetry-dependencies
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}

    - name: Execute Project Dependencies Installation
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --no-interaction

    - name: Validate Formatting Constraints with Ruff
      run: poetry run ruff format . --check

    - name: Scan Linting Guidelines with Ruff
      run: poetry run ruff check .

    - name: Run Test Suite Assertions with Pytest
      run: poetry run pytest -v