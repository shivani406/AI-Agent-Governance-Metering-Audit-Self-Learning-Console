[project]
name = "y"
version = "0.1.0"
description = "A Platform that allows you to moniter, record audit and track the usage of all AI agents used in your ennterprise"
authors = [
    {name = "Your Name",email = "you@example.com"}
]

requires-python = ">=3.10"
dependencies = [
    "fastapi (>=0.136.3,<0.137.0)",
    "uvicorn (>=0.48.0,<0.49.0)",
    "pydantic (>=2.13.4,<3.0.0)"
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
packages = [
    { include = "agent_governance_console", from ="src" }
]